spring.application.name=ms-canchas
# IMPORTANTE: Usamos el puerto 8082 para que no choque con el 8081 de Recintos
server.port=8082

# Conexión a la nueva DB
spring.datasource.url=jdbc:mysql://localhost:3306/db_canchas?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Migraciones y Logs
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true