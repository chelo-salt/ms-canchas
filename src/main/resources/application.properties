# ==========================================
# 1. IDENTIFICACIÓN Y PUERTO
# ==========================================
spring.application.name=ms-canchas
# Usamos el 8082 para evitar conflictos
server.port=8082

# ==========================================
# 2. CONEXIÓN A MYSQL
# ==========================================
# Asegúrate de que 'db_canchas' exista en tu MySQL Workbench
spring.datasource.url=jdbc:mysql://localhost:3306/db_canchas?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# 3. FLYWAY (MIGRACIONES)
# ==========================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ==========================================
# 4. JPA / HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# 5. SEGURIDAD JWT (NUEVO - CLAVE PARA VALIDAR)
# ==========================================
# Esta firma DEBE ser la misma que en ms-auth y ms-recintos
jwt.secret=esta_es_mi_clave_secreta_para_la_muni_2026
# El token expira en 1 hora (3600000 ms)
jwt.expiration=3600000